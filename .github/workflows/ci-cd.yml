name: CI-CD React Docker Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set VERSION env
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: docker build -t alfinakash/autodeploy-ec2-docker:${{ env.VERSION }} .

      - name: Push Docker image
        run: docker push alfinakash/autodeploy-ec2-docker:${{ env.VERSION }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
              echo "Docker not found, installing..."
              sudo apt update -y
              sudo apt install docker.io -y
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker $USER
              newgrp docker
            else
              echo "Docker is already installed"
            fi

            docker pull alfinakash/autodeploy-ec2-docker:${{ env.VERSION }}
            docker stop autodeploy || true
            docker rm autodeploy || true
            docker run -d -p 80:3000 --restart unless-stopped \
              --name autodeploy alfinakash/autodeploy-ec2-docker:${{ env.VERSION }}